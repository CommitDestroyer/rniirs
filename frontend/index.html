<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Satellite Monitor - Real-time Tracking</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        #cesiumContainer {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            z-index: 1;
        }
        
        .control-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 2;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 15px;
            color: white;
            min-width: 280px;
            max-width: 320px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            font-size: 13px;
            pointer-events: auto;
        }
        
        .control-panel h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            padding-bottom: 5px;
        }
        
        .filter-group {
            margin-bottom: 12px;
        }
        
        .filter-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            color: #aaa;
        }
        
        .filter-group select, .filter-group input {
            width: 100%;
            padding: 6px 10px;
            background: rgba(30, 30, 40, 0.9);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            border-radius: 6px;
            font-size: 12px;
        }
        
        .filter-group select:focus, .filter-group input:focus {
            outline: none;
            border-color: #4CAF50;
        }
        
        .satellite-list {
            max-height: 250px;
            overflow-y: auto;
            margin-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 10px;
        }
        
        .satellite-item {
            padding: 6px 8px;
            margin: 4px 0;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 11px;
        }
        
        .satellite-item:hover {
            background: rgba(76, 175, 80, 0.3);
            transform: translateX(3px);
        }
        
        .satellite-item.selected {
            background: rgba(76, 175, 80, 0.5);
            border-left: 3px solid #4CAF50;
        }
        
        .info-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 2;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 15px;
            color: white;
            min-width: 260px;
            max-width: 300px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            pointer-events: auto;
            font-size: 12px;
        }
        
        .info-panel h4 {
            margin: 0 0 8px 0;
            color: #4CAF50;
        }
        
        .info-panel .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            padding: 3px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .info-panel .info-label {
            color: #aaa;
            font-weight: 500;
        }
        
        .info-panel .info-value {
            font-family: monospace;
            color: #fff;
        }
        
        .status-badge {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 2;
            background: rgba(0,0,0,0.7);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #4CAF50;
            font-family: monospace;
        }
        
        .btn {
            background: #4CAF50;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 11px;
            margin-top: 8px;
            width: 100%;
        }
        
        .btn:hover {
            background: #45a049;
        }
        
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(76, 175, 80, 0.5);
            border-radius: 3px;
        }
    </style>
    <link href="https://unpkg.com/cesium@1.111/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <script src="https://unpkg.com/cesium@1.111/Build/Cesium/Cesium.js"></script>
</head>
<body>
    <div id="cesiumContainer"></div>
    
    <div class="control-panel">
        <h3>🛰️ Satellite Monitor</h3>
        <div class="filter-group">
            <label>📡 Type</label>
            <select id="typeFilter">
                <option value="">All</option>
                <option value="LEO">LEO (Low Earth Orbit)</option>
                <option value="MEO">MEO (Medium Earth Orbit)</option>
                <option value="GEO">GEO (Geostationary)</option>
            </select>
        </div>
        <div class="filter-group">
            <label>🏢 Operator</label>
            <select id="operatorFilter">
                <option value="">All</option>
            </select>
        </div>
        <button class="btn" id="refreshBtn">🔄 Refresh Positions</button>
        <div class="satellite-list" id="satelliteList">
            <div style="text-align:center; color:#888;">Loading satellites...</div>
        </div>
    </div>
    
    <div class="info-panel" id="infoPanel" style="display: none;">
        <h4 id="satName">Satellite Name</h4>
        <div class="info-row">
            <span class="info-label">Operator:</span>
            <span class="info-value" id="satOperator">-</span>
        </div>
        <div class="info-row">
            <span class="info-label">Orbit Type:</span>
            <span class="info-value" id="satType">-</span>
        </div>
        <div class="info-row">
            <span class="info-label">Altitude:</span>
            <span class="info-value" id="satAltitude">-</span>
        </div>
        <div class="info-row">
            <span class="info-label">Period:</span>
            <span class="info-value" id="satPeriod">-</span>
        </div>
        <div class="info-row">
            <span class="info-label">Latitude:</span>
            <span class="info-value" id="satLat">-</span>
        </div>
        <div class="info-row">
            <span class="info-label">Longitude:</span>
            <span class="info-value" id="satLon">-</span>
        </div>
        <button class="btn" id="closeInfoBtn">Close</button>
    </div>
    
    <div class="status-badge" id="status">🟢 Connected | 0 satellites</div>

    <script>
        // Конфигурация Cesium
        Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJlYzUxZjhiZi1hNDJkLTRmYzUtYjNjMS0zYzA0MzQ0YTQ5YzkiLCJpZCI6MjU2NTM2LCJpYXQiOjE3MzcwNzU4Mzd9.DXpDyCvNtXlT2HwBXnP8qZXfWb-zr6VbRRpMO0bVbOE';
        
        const viewer = new Cesium.Viewer('cesiumContainer', {
            terrainProvider: Cesium.createWorldTerrain(),
            skyBox: false,
            skyAtmosphere: true,
            timeline: true,
            animation: true,
            baseLayerPicker: false,
            infoBox: false,
            selectionIndicator: false,
            navigationHelpButton: false,
            sceneModePicker: true,
            fullscreenButton: true,
            vrButton: false,
            geocoder: false,
            homeButton: true
        });
        
        // Убираем стандартный credit
        viewer.creditContainer.style.display = 'none';
        
        // Переменные
        let satellites = [];
        let satelliteEntities = new Map();
        let orbitEntities = new Map();
        let currentSelectedSat = null;
        let updateInterval = null;
        
        const API_URL = 'http://localhost:8000';
        
        // Загрузка списка спутников
        async function loadSatellites() {
            try {
                const type = document.getElementById('typeFilter').value;
                const operator = document.getElementById('operatorFilter').value;
                
                let url = `${API_URL}/satellites`;
                const params = new URLSearchParams();
                if (type) params.append('sat_type', type);
                if (operator) params.append('operator', operator);
                if (params.toString()) url += `?${params.toString()}`;
                
                const response = await fetch(url);
                satellites = await response.json();
                
                updateSatelliteList();
                updateStatus();
                
                // Загружаем позиции для всех спутников
                await updateAllPositions();
                
                return satellites;
            } catch (error) {
                console.error('Error loading satellites:', error);
                document.getElementById('status').innerHTML = '🔴 Error connecting to API';
                return [];
            }
        }
        
        // Обновление списка спутников в UI
        function updateSatelliteList() {
            const container = document.getElementById('satelliteList');
            if (satellites.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#888;">No satellites found</div>';
                return;
            }
            
            container.innerHTML = satellites.map(sat => `
                <div class="satellite-item ${currentSelectedSat === sat.id ? 'selected' : ''}" 
                     onclick="selectSatellite(${sat.id})">
                    <strong>${sat.name}</strong><br>
                    <small>${sat.operator} | ${sat.type}</small>
                </div>
            `).join('');
        }
        
        // Обновление позиций всех спутников
        async function updateAllPositions() {
            if (satellites.length === 0) return;
            
            try {
                const satIds = satellites.map(s => s.id);
                const response = await fetch(`${API_URL}/satellites/positions`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(satIds)
                });
                
                const positions = await response.json();
                
                // Обновляем или создаем сущности для каждого спутника
                positions.forEach(pos => {
                    updateSatelliteEntity(pos);
                });
                
                document.getElementById('status').innerHTML = `🟢 Connected | ${satellites.length} satellites`;
            } catch (error) {
                console.error('Error updating positions:', error);
            }
        }
        
        // Обновление отдельного спутника на карте
        function updateSatelliteEntity(pos) {
            let entity = satelliteEntities.get(pos.id);
            const position = Cesium.Cartesian3.fromDegrees(pos.longitude, pos.latitude, pos.altitude_km * 1000);
            
            if (!entity) {
                // Создаем новый entity
                entity = viewer.entities.add({
                    id: `sat_${pos.id}`,
                    name: pos.name,
                    position: position,
                    point: {
                        pixelSize: 8,
                        color: Cesium.Color.fromCssColorString('#4CAF50'),
                        outlineColor: Cesium.Color.WHITE,
                        outlineWidth: 2,
                        heightReference: Cesium.HeightReference.NONE
                    },
                    label: {
                        text: pos.name,
                        font: '10px sans-serif',
                        fillColor: Cesium.Color.WHITE,
                        style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                        outlineWidth: 2,
                        verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                        pixelOffset: new Cesium.Cartesian2(0, -10),
                        show: false
                    },
                    description: `<b>${pos.name}</b><br>Altitude: ${pos.altitude_km.toFixed(1)} km<br>Lat: ${pos.latitude.toFixed(2)}°<br>Lon: ${pos.longitude.toFixed(2)}°`
                });
                
                entity.satId = pos.id;
                satelliteEntities.set(pos.id, entity);
                
                // Добавляем обработчик клика
                entity.onClick = () => selectSatellite(pos.id);
            } else {
                // Обновляем позицию
                entity.position = position;
                entity.description = `<b>${pos.name}</b><br>Altitude: ${pos.altitude_km.toFixed(1)} km<br>Lat: ${pos.latitude.toFixed(2)}°<br>Lon: ${pos.longitude.toFixed(2)}°`;
            }
        }
        
        // Выбор спутника
        async function selectSatellite(satId) {
            currentSelectedSat = satId;
            updateSatelliteList();
            
            const sat = satellites.find(s => s.id === satId);
            if (!sat) return;
            
            // Получаем детальную информацию
            try {
                const response = await fetch(`${API_URL}/satellites/${satId}/position`);
                const data = await response.json();
                
                // Показываем информационную панель
                document.getElementById('satName').innerHTML = `🛰️ ${data.name}`;
                document.getElementById('satOperator').innerHTML = data.operator;
                document.getElementById('satType').innerHTML = data.orbit_type || data.type;
                document.getElementById('satAltitude').innerHTML = `${data.altitude_km.toFixed(1)} km`;
                document.getElementById('satPeriod').innerHTML = `${data.period_minutes} min`;
                document.getElementById('satLat').innerHTML = `${data.latitude.toFixed(2)}°`;
                document.getElementById('satLon').innerHTML = `${data.longitude.toFixed(2)}°`;
                document.getElementById('infoPanel').style.display = 'block';
                
                // Загружаем и показываем орбиту
                await loadOrbit(satId);
                
                // Центрируем камеру на спутник
                viewer.camera.flyTo({
                    destination: Cesium.Cartesian3.fromDegrees(data.longitude, data.latitude, data.altitude_km * 1000 * 3),
                    duration: 1.5
                });
            } catch (error) {
                console.error('Error loading satellite details:', error);
            }
        }
        
        // Загрузка орбиты спутника
        async function loadOrbit(satId) {
            try {
                const response = await fetch(`${API_URL}/satellites/${satId}/orbit?duration_minutes=90&steps=180`);
                const data = await response.json();
                
                // Удаляем старую орбиту
                if (orbitEntities.has(satId)) {
                    viewer.entities.remove(orbitEntities.get(satId));
                }
                
                // Создаем полилинию для орбиты
                const positions = data.positions.map(p => 
                    Cesium.Cartesian3.fromDegrees(p[0], p[1], p[2] * 1000)
                );
                
                const orbit = viewer.entities.add({
                    polyline: {
                        positions: positions,
                        width: 2,
                        material: Cesium.Color.fromCssColorString('#4CAF50'),
                        clampToGround: false
                    }
                });
                
                orbitEntities.set(satId, orbit);
            } catch (error) {
                console.error('Error loading orbit:', error);
            }
        }
        
        // Обновление операторов в фильтре
        async function loadOperators() {
            try {
                const response = await fetch(`${API_URL}/operators`);
                const data = await response.json();
                const select = document.getElementById('operatorFilter');
                data.operators.forEach(op => {
                    const option = document.createElement('option');
                    option.value = op;
                    option.textContent = op;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading operators:', error);
            }
        }
        
        // Обновление статуса
        function updateStatus() {
            document.getElementById('status').innerHTML = `🟢 Connected | ${satellites.length} satellites`;
        }
        
        // Инициализация
        async function init() {
            await loadOperators();
            await loadSatellites();
            
            // Запускаем обновление позиций каждые 2 секунды
            updateInterval = setInterval(updateAllPositions, 2000);
            
            // Добавляем обработчики событий
            document.getElementById('refreshBtn').onclick = () => updateAllPositions();
            document.getElementById('typeFilter').onchange = () => loadSatellites();
            document.getElementById('operatorFilter').onchange = () => loadSatellites();
            document.getElementById('closeInfoBtn').onclick = () => {
                document.getElementById('infoPanel').style.display = 'none';
                currentSelectedSat = null;
                updateSatelliteList();
                
                // Удаляем отображение орбиты
                if (orbitEntities.size > 0) {
                    orbitEntities.forEach((entity, id) => {
                        viewer.entities.remove(entity);
                    });
                    orbitEntities.clear();
                }
            };
            
            // Настройка вида
            viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(0, 20, 20000000),
                duration: 2
            });
        }
        
        // Запуск
        init();
    </script>
</body>
</html>
